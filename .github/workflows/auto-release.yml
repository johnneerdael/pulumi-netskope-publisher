name: Auto Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_type:
        description: Semver segment to bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: auto-release-main
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || (!contains(github.event.head_commit.message, 'chore(release):') && !contains(github.event.head_commit.message, '[skip release]'))
    runs-on: ubuntu-latest
    env:
      RELEASE_TYPE: ${{ github.event.inputs.release_type || 'patch' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - uses: dtolnay/rust-toolchain@stable

      - run: npm ci

      - name: Install Python packaging tools
        run: python3 -m pip install --upgrade build twine

      - name: Verify publishing tokens
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::Configure the NPM_TOKEN repository secret before automatic releases can publish."
            exit 1
          fi
          if [ -z "$PYPI_API_TOKEN" ]; then
            echo "::error::Configure the PYPI_API_TOKEN repository secret before automatic releases can publish the Python SDK."
            exit 1
          fi
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::Configure the NUGET_API_KEY repository secret before automatic releases can publish the C# SDK."
            exit 1
          fi
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::error::Configure the CARGO_REGISTRY_TOKEN repository secret before automatic releases can publish the Rust SDK."
            exit 1
          fi

      - name: Bump release version
        id: version
        run: |
          version="$(npm run --silent release:bump -- "$RELEASE_TYPE")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Run release checks
        run: npm run release:check

      - name: Publish npm package
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "npm package ${package_name}@${package_version} already exists; skipping."
            exit 0
          fi
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Rebuild plugin archives after npm prepack
        run: npm run plugin:dist

      - name: Rebuild SDK packages after npm prepack
        run: npm run sdk:pack

      - name: Publish Python SDK
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: python3 -m twine upload --non-interactive --skip-existing -u __token__ -p "$PYPI_API_TOKEN" dist/sdks/python/*

      - name: Publish C# SDK
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push dist/sdks/dotnet/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish Java SDK
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
          JAVA_MAVEN_REPOSITORY_URL: ${{ vars.JAVA_MAVEN_REPOSITORY_URL }}
          JAVA_MAVEN_GROUP_ID: ${{ vars.JAVA_MAVEN_GROUP_ID }}
          JAVA_MAVEN_AUTH_BASE64: ${{ secrets.JAVA_MAVEN_AUTH_BASE64 }}
          JAVA_MAVEN_USERNAME: ${{ secrets.JAVA_MAVEN_USERNAME }}
          JAVA_MAVEN_PASSWORD: ${{ secrets.JAVA_MAVEN_PASSWORD }}
          JAVA_SIGNING_KEY: ${{ secrets.JAVA_SIGNING_KEY }}
          JAVA_SIGNING_PASSWORD: ${{ secrets.JAVA_SIGNING_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repo_url="${JAVA_MAVEN_REPOSITORY_URL:-https://maven.pkg.github.com/${GITHUB_REPOSITORY}}"
          java_maven_group_id="${JAVA_MAVEN_GROUP_ID:-com.pulumi}"
          artifact_path="$(printf '%s' "$java_maven_group_id" | tr '.' '/')/netskope-publisher/${PACKAGE_VERSION}/netskope-publisher-${PACKAGE_VERSION}.pom"
          if [ -n "$JAVA_MAVEN_AUTH_BASE64" ]; then
            artifact_status="$(curl --silent --output /dev/null --write-out '%{http_code}' --head \
              -H "Authorization: Bearer ${JAVA_MAVEN_AUTH_BASE64}" \
              "${repo_url%/}/${artifact_path}")"
            if [ "$artifact_status" = "200" ]; then
              echo "Java SDK ${java_maven_group_id}:netskope-publisher:${PACKAGE_VERSION} already exists; skipping."
              exit 0
            fi
            PUBLISH_REPO_URL="$repo_url" \
              JAVA_MAVEN_GROUP_ID="$java_maven_group_id" \
              PUBLISH_REPO_BEARER_TOKEN="$JAVA_MAVEN_AUTH_BASE64" \
              SIGNING_KEY="$JAVA_SIGNING_KEY" \
              SIGNING_PASSWORD="$JAVA_SIGNING_PASSWORD" \
              gradle publish
          else
            repo_username="${JAVA_MAVEN_USERNAME:-${GITHUB_ACTOR}}"
            repo_password="${JAVA_MAVEN_PASSWORD:-${GITHUB_TOKEN}}"
            artifact_status="$(curl --silent --output /dev/null --write-out '%{http_code}' --head \
              -u "${repo_username}:${repo_password}" \
              "${repo_url%/}/${artifact_path}")"
            if [ "$artifact_status" = "200" ]; then
              echo "Java SDK ${java_maven_group_id}:netskope-publisher:${PACKAGE_VERSION} already exists; skipping."
              exit 0
            fi
            PUBLISH_REPO_URL="$repo_url" \
              JAVA_MAVEN_GROUP_ID="$java_maven_group_id" \
              PUBLISH_REPO_USERNAME="$repo_username" \
              PUBLISH_REPO_PASSWORD="$repo_password" \
              SIGNING_KEY="$JAVA_SIGNING_KEY" \
              SIGNING_PASSWORD="$JAVA_SIGNING_PASSWORD" \
              gradle publish
          fi
        working-directory: sdk/java

      - name: Publish Rust SDK
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          crate_status="$(curl --silent --output /dev/null --write-out '%{http_code}' \
            -H "User-Agent: pulumi-netskope-publisher-release-check (https://github.com/johnneerdael/pulumi-netskope-publisher)" \
            "https://crates.io/api/v1/crates/pulumi-netskope-publisher/${PACKAGE_VERSION}")"
          if [ "$crate_status" = "200" ]; then
            echo "Rust crate pulumi-netskope-publisher ${PACKAGE_VERSION} already exists; skipping."
            exit 0
          fi
          if [ "$crate_status" != "404" ]; then
            echo "::error::Unable to check crates.io for pulumi-netskope-publisher ${PACKAGE_VERSION}; HTTP ${crate_status}."
            exit 1
          fi
          cargo publish --allow-dirty
        working-directory: sdk/rust

      - name: Commit release bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json schema.json internal/provider/provider.go sdk
          git commit -m "chore(release): v${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: dist/plugins/*.tar.gz

      - name: Open or update Pulumi Registry PR
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.REGISTRY_PR_TOKEN }}
          REGISTRY_FORK: ${{ secrets.PULUMI_REGISTRY_FORK || vars.PULUMI_REGISTRY_FORK }}
        run: |
          if [ -z "$GH_TOKEN" ] || [ -z "$REGISTRY_FORK" ]; then
            echo "Skipping Registry PR. Configure REGISTRY_PR_TOKEN and PULUMI_REGISTRY_FORK to enable it."
            exit 0
          fi

          branch="add-pulumi-netskope-publisher"
          fork_owner="${REGISTRY_FORK%%/*}"
          workdir="$(mktemp -d)"
          body_file="$workdir/registry-pr-body.md"
          sed "s/{{TAG}}/${{ steps.version.outputs.tag }}/g" "$GITHUB_WORKSPACE/docs/registry-pr-body.md" > "$body_file"

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${REGISTRY_FORK}.git" "$workdir/registry"
          cd "$workdir/registry"
          git remote add upstream https://github.com/pulumi/registry.git
          git fetch upstream
          default_branch="$(gh repo view pulumi/registry --json defaultBranchRef --jq '.defaultBranchRef.name')"
          git checkout -B "$branch" "upstream/$default_branch"

          node - <<'NODE'
          const { readFileSync, writeFileSync } = require("node:fs");
          const path = "community-packages/package-list.json";
          const data = JSON.parse(readFileSync(path, "utf8"));
          const entry = {
            repoSlug: "johnneerdael/pulumi-netskope-publisher",
            schemaFile: "schema.json"
          };
          const packages = data.include ?? data.packages ?? data;
          const existing = packages.find((pkg) => pkg.repoSlug === entry.repoSlug);
          if (existing) {
            existing.schemaFile = entry.schemaFile;
          } else {
            packages.push(entry);
          }
          writeFileSync(path, `${JSON.stringify(data, null, 2)}\n`);
          NODE

          if git diff --quiet; then
            echo "Pulumi Registry package list already contains this package."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add community-packages/package-list.json
          git commit -m "Add pulumi-netskope-publisher package"
          git push --force-with-lease origin "$branch"

          existing_pr="$(gh pr list --repo pulumi/registry --head "$fork_owner:$branch" --json number --jq '.[0].number')"
          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" --repo pulumi/registry \
              --title "Add pulumi-netskope-publisher package" \
              --body-file "$body_file"
          else
            gh pr create --repo pulumi/registry \
              --base "$default_branch" \
              --head "$fork_owner:$branch" \
              --title "Add pulumi-netskope-publisher package" \
              --body-file "$body_file"
          fi
